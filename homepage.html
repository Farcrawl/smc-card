<body class="container-general" style="background-color:#E5DDC8 ;">

    <section class="w-100">

     <header class="container d-flex bd-navbar">
            <div class="text-light w-100  text-center title-navbar font-icon1">  <i class="fa fa-id-card"> </i> SMC ICT Card Generator</div>
        </header>
            </nav>
        <div class="container d-flex container-box ">
            <div class="section-container section-left col-5 pt-3 pb-3">
                <div class="text-left subtitle-section">
                    <p>
                        Enter Staff Details
                    </p>

                </div>
                <form onsubmit="return false" class="form-box">
                    <div class="form-element font-icon">
                        <label class="form-label">
                            Staff Name:
                        </label>

                        <input class="form-input" type="text" id="name" maxlength="99"/>
                        <i class="fa fa-user fa-lg"></i>
                    </div>
                    <div class="form-element font-icon">
                        <label class="form-label">
                            Enter Company Name:
                        </label>
                        <input class="form-input" type="text" id="company" />
                        <i class="fa fa-university"></i>
                    </div>
                    <div class="form-element font-icon">
                        <label class="form-label">
                            Enter Department:
                        </label>
                        
                        <i class="fa fa-industry"></i>
						 <select class="form-control" id="department">
                                <option>Ict Department</option>
                                
                                </select>
                    </div>
					
					<div class="d-flex ">
                        <button class="btn-generate" onclick="generateCard()">Generate Card</button>
                    </div>
					
                    <div class="form-element2 font-icon">
                        <label class="form-label">
                            Upload Passport Photo
                        </label>
						<input type="file" class="form-label label" id="image-input" accept="image/jpeg, image/png, image/jpg image/jiff">
						 <label class = "label2">
                            Resize Photo
                        </label>
				<input type='range' id='img-slider' min="100" max="400" value="150">
                    </div>




                </form>
            </div>
            <div class="section-container section-right col-7">
                <div class="id-card-container" id="collegeCard">

                    <div class="card-container">
                        <div class="card-wrapper">
